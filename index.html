<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Subway Surfers - Modded Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="text/javascript">
        document.domain = '4399.com';
    </script>
    <script type="text/javascript" src="4399.js"></script>
    <script>
        // Set configuration details and inject specific variables for loading target map
        window.config = {
            loader: 'unity',
            debug: false,
            maxRatio: 16 / 9,
            minRatio: 9 / 16,

            title: 'Subway Surfers',
            numScreenshots: 4,

            unityVersion: '2019.4.18f1',
            unityWebglBuildUrl: 'Build/SanFrancisco.json',

            // Custom global parameter handles to influence map loading processes
            mapName: 'st_training_map',
            environment: 'training',
            enableCheats: true,

            fileSize: 35,
            cachedDecompressedFileSizes: {
                'SanFrancisco.asm.code.unityweb': 9077143,
                'SanFrancisco.asm.framework.unityweb': 86369,
                'SanFrancisco.asm.memory.unityweb': 951447,
                'SanFrancisco.data.unityweb': 18323917,
                'SanFrancisco.wasm.code.unityweb': 7279617,
                'SanFrancisco.wasm.framework.unityweb': 90693,
            }
        };

        // WASD Input Translation Overlay Layer
        (function() {
            const keysToMap = {
                'KeyW': { key: 'ArrowUp', keyCode: 38, code: 'ArrowUp' },
                'KeyS': { key: 'ArrowDown', keyCode: 40, code: 'ArrowDown' },
                'KeyA': { key: 'ArrowLeft', keyCode: 37, code: 'ArrowLeft' },
                'KeyD': { key: 'ArrowRight', keyCode: 39, code: 'ArrowRight' }
            };

            function triggerSimulatedKey(original, phase) {
                if (keysToMap[original.code]) {
                    original.stopImmediatePropagation();
                    original.preventDefault();

                    const canvas = document.querySelector('canvas') || document.getElementById('canvas');
                    if (canvas) {
                        const simulated = new KeyboardEvent(phase, {
                            key: keysToMap[original.code].key,
                            code: keysToMap[original.code].code,
                            keyCode: keysToMap[original.code].keyCode,
                            which: keysToMap[original.code].keyCode,
                            bubbles: true,
                            cancelable: true
                        });
                        canvas.dispatchEvent(simulated);
                    }
                }
            }

            window.addEventListener('keydown', function(e) { triggerSimulatedKey(e, 'keydown'); }, true);
            window.addEventListener('keyup', function(e) { triggerSimulatedKey(e, 'keyup'); }, true);
        })();
    </script>
</head>

<body>
    <div id="game-container" style="width: 100vw; height: 100vh; margin: 0; padding: 0; overflow: hidden; background-color: #000;">
        <canvas id="canvas" style="width: 100%; height: 100%; display: block;"></canvas>
    </div>
    <script type="text/javascript" src="master-loader.js"></script>
    <script type="text/javascript">
        window.SDK_OPTIONS = {
            gameId: "4i34j6xes2vdim7k55nky9w8s7wp1m75",
            onEvent: function (eventData) {
                switch (eventData.name) {
                    case "SDK_GAME_PAUSE":
                        break;
                    case "SDK_GAME_START":
                        break;
                }
            }
        };

        (function (d, s, id) {
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) return;
            js = d.createElement(s); js.id = id;
            js.src = "https://api.gamemonetize.com/sdk.js";
            fjs.parentNode.insertBefore(js, fjs);
        })(document, "script", "gamemonetize-sdk");
    </script>
</body>

</html>
